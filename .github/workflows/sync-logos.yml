name: Sync logos from upstream

# Keeps this repo's logos (and assets/logos.json) up to date with the upstream
# collection automatically, so the Figma plugin + website always have the latest —
# no manual work. Runs daily, and can be triggered by hand from the Actions tab.
# When new logos arrive it also drops a note into assets/updates.json so the
# website bell, the Updates page and the Figma plugin all show what changed.

on:
  schedule:
    - cron: "0 6 * * *"   # every day 06:00 UTC
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: sync-logos
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Pull only the logos/ folder from upstream
        run: |
          git remote add upstream https://github.com/ln-dev7/logos-apps.git || true
          git fetch --no-tags --depth=1 upstream master
          git checkout upstream/master -- logos/

      - name: Regenerate README, categories, index.html + assets/logos.json
        run: python3 scripts/gen_site.py

      - name: Note new logos in the updates feed (bell + plugin)
        run: |
          git add -A
          ADDED=$(git diff --cached --name-only --diff-filter=A -- logos/ | wc -l | tr -d ' ')
          UPDATED=$(git diff --cached --name-only --diff-filter=M -- logos/ | wc -l | tr -d ' ')
          REMOVED=$(git diff --cached --name-only --diff-filter=D -- logos/ | wc -l | tr -d ' ')
          if [ "$ADDED" != "0" ] || [ "$UPDATED" != "0" ] || [ "$REMOVED" != "0" ]; then
            NAMES=$(git diff --cached --name-only --diff-filter=A -- logos/ | head -6 | sed 's#.*/##; s#\.svg$##' | paste -sd, -)
            python3 scripts/log_sync.py --added "$ADDED" --updated "$UPDATED" --removed "$REMOVED" --names "$NAMES" --date "$(date -u +%F)"
          else
            echo "No logo files changed — skipping updates note."
          fi

      - name: Commit & push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new or changed logos — nothing to do."
          else
            COUNT=$(git diff --cached --name-only -- logos/ | wc -l | tr -d ' ')
            git commit -m "chore: sync logos from upstream (automated, ${COUNT} logo files changed)"
            git push
            echo "Synced ${COUNT} changed logo files."
          fi
